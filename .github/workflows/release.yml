name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 2. Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*" 

      - name: 3.1 Prepare pnpm
        uses: pnpm/action-setup@v6

      - name: 3.2 Install dependencies and audit
        run: |
          pnpm ci
          pnpm audit signatures

      - name: 4. Check for errors
        run: pnpm typecheck

      - name: 5. Build
        run: pnpm run build

      - name: 6. Check extension package
        run: |
          test -f out/extension.cjs
          pnpm check:vsce | rg -qx 'out/extension\.cjs'

      - name: 7. Release
        run: pnpm exec semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
